<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

<title>Coin Meter</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Coin Meter">
<meta name="theme-color" content="#10151C">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='13' fill='%23E6B450'/%3E%3Ccircle cx='16' cy='16' r='9' fill='none' stroke='%2310151C' stroke-width='2'/%3E%3C/svg%3E">

<style>
  :root{
    --bg:#10151C; --surface:#1A212B; --surface-2:#232C38; --line:#2E3947;
    --gold:#E6B450; --gold-dim:#A88536; --euro:#2F6BFF;
    --text:#EEF2F7; --muted:#8B95A5; --danger:#FF7A7A; --ok:#5FD08A;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ height:100%; margin:0; }
  body{
    background:var(--bg); color:var(--text);
    font-family:-apple-system,"SF Pro Text",system-ui,Segoe UI,Roboto,sans-serif;
    display:flex; flex-direction:column;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    overflow:hidden; height:100dvh;
  }
  header{ flex:0 0 auto; padding:14px 20px 10px; display:flex; align-items:baseline; justify-content:space-between; gap:12px; }
  .wordmark{ font-family:ui-monospace,"SF Mono",Menlo,monospace; font-weight:600; letter-spacing:.14em; font-size:15px; color:var(--text); }
  .wordmark b{ color:var(--gold); font-weight:600; }
  .ver{ color:var(--gold-dim); font-size:11px; letter-spacing:.08em; margin-left:6px; }
  .status{ font-family:ui-monospace,"SF Mono",Menlo,monospace; font-size:11px; letter-spacing:.06em; color:var(--muted); display:flex; align-items:center; gap:7px; white-space:nowrap; }
  .dot{ width:7px; height:7px; border-radius:50%; background:var(--muted); flex:0 0 auto; }
  .dot.live{ background:var(--ok); animation:pulse 1.8s infinite; }
  .dot.busy{ background:var(--gold); animation:pulse 1.1s infinite; }
  .dot.err{ background:var(--danger); }
  @keyframes pulse{ 0%{ box-shadow:0 0 0 0 rgba(230,180,80,.5);} 70%{ box-shadow:0 0 0 6px rgba(230,180,80,0);} 100%{ box-shadow:0 0 0 0 rgba(230,180,80,0);} }

  .stage{ flex:1 1 auto; position:relative; margin:4px 16px 8px; border-radius:20px; overflow:hidden; background:#000; border:1px solid var(--line); display:flex; align-items:center; justify-content:center; }
  video, .shot{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; display:none; }
  video.on, .shot.on{ display:block; }

  .reticle{ position:absolute; inset:0; pointer-events:none; display:none; }
  .reticle.on{ display:block; }
  .reticle span{ position:absolute; width:26px; height:26px; border:2px solid rgba(230,180,80,.85); }
  .reticle .tl{ top:14px; left:14px; border-right:0; border-bottom:0; border-radius:6px 0 0 0; }
  .reticle .tr{ top:14px; right:14px; border-left:0; border-bottom:0; border-radius:0 6px 0 0; }
  .reticle .bl{ bottom:14px; left:14px; border-right:0; border-top:0; border-radius:0 0 0 6px; }
  .reticle .br{ bottom:14px; right:14px; border-left:0; border-top:0; border-radius:0 0 6px 0; }

  .panel{ position:relative; z-index:2; max-width:300px; margin:auto; text-align:center; padding:26px 22px; display:flex; flex-direction:column; align-items:center; gap:14px; }
  .panel.hidden{ display:none; }
  .glyph{ width:56px; height:56px; border-radius:50%; border:2px solid var(--gold); display:flex; align-items:center; justify-content:center; color:var(--gold); }
  .panel h1{ font-size:17px; margin:0; font-weight:600; letter-spacing:-.01em; }
  .panel p{ font-size:13.5px; line-height:1.5; color:var(--muted); margin:0; }
  .panel p code{ font-family:ui-monospace,"SF Mono",Menlo,monospace; color:var(--gold); font-size:12.5px; }
  .panel.error .glyph{ border-color:var(--danger); color:var(--danger); }

  .readout{ position:absolute; left:12px; right:12px; bottom:12px; z-index:3; background:rgba(16,21,28,.86); border:1px solid var(--line); border-radius:14px; padding:11px 14px; display:none; backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px); }
  .readout.on{ display:block; }
  .readout .r1{ font-family:ui-monospace,"SF Mono",Menlo,monospace; font-size:14px; font-weight:600; color:var(--text); display:flex; align-items:center; gap:8px; }
  .readout .r1 .tick{ color:var(--ok); }
  .readout .r1 .bad{ color:var(--danger); }
  .readout .r2{ font-family:ui-monospace,"SF Mono",Menlo,monospace; font-size:11px; color:var(--muted); margin-top:4px; line-height:1.5; }

  .controls{ flex:0 0 auto; padding:10px 20px calc(14px + env(safe-area-inset-bottom)); display:flex; align-items:center; justify-content:center; gap:18px; min-height:104px; position:relative; }
  .shutter{ width:74px; height:74px; border-radius:50%; border:0; padding:0; background:transparent; cursor:pointer; display:flex; align-items:center; justify-content:center; position:relative; }
  .shutter::before{ content:""; position:absolute; inset:0; border-radius:50%; border:3px solid var(--gold); }
  .shutter::after{ content:""; width:56px; height:56px; border-radius:50%; background:var(--gold); transition:transform .08s ease, background .15s ease; }
  .shutter:active::after{ transform:scale(.88); background:var(--gold-dim); }
  .shutter[disabled]{ opacity:.4; pointer-events:none; }

  .btn{ font-family:-apple-system,system-ui,sans-serif; font-size:15px; font-weight:600; color:var(--bg); background:var(--gold); border:0; border-radius:999px; padding:14px 24px; cursor:pointer; letter-spacing:.01em; }
  .btn:active{ background:var(--gold-dim); }
  .btn[disabled]{ opacity:.5; pointer-events:none; }
  .btn.ghost{ background:transparent; color:var(--text); border:1px solid var(--line); }
  .btn.ghost:active{ background:var(--surface-2); }

  .tuner{ flex:0 0 auto; padding:6px 24px 0; }
  .tuner.hidden{ display:none; }
  .tuner-row{ display:flex; justify-content:space-between; align-items:baseline; font-family:ui-monospace,Menlo,monospace; }
  .tuner-label{ font-size:12px; letter-spacing:.08em; color:var(--muted); }
  .tuner-val{ font-size:13px; color:var(--gold); font-weight:600; }
  input[type=range]{ width:100%; accent-color:var(--gold); margin:7px 0 3px; height:26px; }
  .tuner-hint{ font-family:ui-monospace,Menlo,monospace; font-size:10px; color:var(--muted); text-align:center; letter-spacing:.04em; }
  .hidden{ display:none !important; }
  .hint{ position:absolute; bottom:6px; left:0; right:0; text-align:center; font-family:ui-monospace,"SF Mono",Menlo,monospace; font-size:10.5px; letter-spacing:.05em; color:var(--muted); pointer-events:none; }
</style>
</head>
<body>

  <header>
    <div class="wordmark">COIN<b>&middot;</b>METER <span class="ver" id="ver">v9</span></div>
    <div class="status" id="status"><span class="dot" id="dot"></span><span id="statusText">Starting up&hellip;</span></div>
  </header>

  <main class="stage">
    <video id="video" playsinline autoplay muted></video>
    <canvas id="shot" class="shot"></canvas>
    <div class="reticle" id="reticle"><span class="tl"></span><span class="tr"></span><span class="bl"></span><span class="br"></span></div>

    <div class="readout" id="readout">
      <div class="r1" id="readoutMain"></div>
      <div class="r2" id="readoutSub"></div>
    </div>

    <div class="panel" id="startPanel">
      <div class="glyph">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
      </div>
      <h1>Photograph your coins</h1>
      <p>Spread the coins on a plain surface and lay a bank card flat in the frame for scale. Then start the camera.</p>
      <button class="btn" id="startBtn">Start camera</button>
    </div>

    <div class="panel error hidden" id="errorPanel">
      <div class="glyph">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      </div>
      <h1 id="errorTitle">Camera unavailable</h1>
      <p id="errorText"></p>
      <button class="btn ghost" id="retryBtn">Try again</button>
    </div>
  </main>

  <div class="tuner hidden" id="tuner">
    <div class="tuner-row"><span class="tuner-label">Detection threshold</span><span class="tuner-val" id="tunerVal">34</span></div>
    <input type="range" id="thresh" min="18" max="60" value="34" step="1">
    <div class="tuner-hint">lower = more coins &middot; higher = stricter</div>
  </div>

  <section class="controls" id="controls">
    <button class="shutter hidden" id="shutterBtn" aria-label="Capture photo"></button>
    <button class="btn ghost hidden" id="retakeBtn">Retake</button>
    <button class="btn hidden" id="findBtn">Find card</button>
    <div class="hint hidden" id="resHint"></div>
  </section>

<script>
(function(){
  "use strict";

  var CARD_LONG = 85.60, CARD_SHORT = 53.98;
  var OPENCV_URL = "https://docs.opencv.org/4.x/opencv.js";

  var video=document.getElementById('video'), shot=document.getElementById('shot'),
      reticle=document.getElementById('reticle'), dot=document.getElementById('dot'),
      statusTxt=document.getElementById('statusText'),
      readout=document.getElementById('readout'), readoutMain=document.getElementById('readoutMain'),
      readoutSub=document.getElementById('readoutSub'),
      startPanel=document.getElementById('startPanel'), errorPanel=document.getElementById('errorPanel'),
      errorTitle=document.getElementById('errorTitle'), errorText=document.getElementById('errorText'),
      startBtn=document.getElementById('startBtn'), retryBtn=document.getElementById('retryBtn'),
      shutterBtn=document.getElementById('shutterBtn'), retakeBtn=document.getElementById('retakeBtn'),
      findBtn=document.getElementById('findBtn'), resHint=document.getElementById('resHint');
  var tuner=document.getElementById('tuner'), thresh=document.getElementById('thresh'), tunerVal=document.getElementById('tunerVal');

  var stream=null, rawImageData=null, cvReady=false, mmPerPx=null;
  var mode='find', lastCard=null, coins=[];
  var VERSION=9, coinParam2=34, threshTimer=null;

  function setStatus(t,k){ statusTxt.textContent=t; dot.className='dot'+(k?' '+k:''); }
  function show(el){ el.classList.remove('hidden'); }
  function hide(el){ el.classList.add('hidden'); }

  function loadOpenCV(){
    return new Promise(function(resolve,reject){
      if(window.cv && cv.Mat) return resolve();
      var s=document.createElement('script');
      s.src=OPENCV_URL; s.async=true;
      s.onerror=function(){ reject(new Error('network')); };
      s.onload=function(){
        if(window.cv && cv.Mat) return resolve();
        cv['onRuntimeInitialized']=function(){ resolve(); };
      };
      document.head.appendChild(s);
    });
  }
  loadOpenCV().then(function(){ cvReady=true; if(!stream) setStatus('Ready',''); refreshFindBtn(); })
              .catch(function(){ setStatus('Vision engine failed','err'); });

  async function startCamera(){
    hide(errorPanel); hide(startPanel); readout.classList.remove('on');
    setStatus('Starting\u2026','busy');
    if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia)
      return showError('Not supported','This browser can\u2019t open the camera. Open the page in Safari on your iPhone.');
    if(!window.isSecureContext)
      return showError('Needs a secure connection','The camera only works over <code>https</code>. Open the hosted (GitHub Pages) URL.');
    try{
      stream=await navigator.mediaDevices.getUserMedia({ audio:false,
        video:{ facingMode:{ ideal:'environment' }, width:{ ideal:1920 }, height:{ ideal:1080 } } });
    }catch(err){ return handleCameraError(err); }
    video.srcObject=stream;
    try{ await video.play(); }catch(e){}
    video.classList.add('on'); reticle.classList.add('on');
    show(shutterBtn); hide(retakeBtn); hide(findBtn); mmPerPx=null; tuner.classList.add('hidden');
    var tr=stream.getVideoTracks()[0], s=(tr&&tr.getSettings)?tr.getSettings():{};
    setStatus('Live \u00b7 rear camera','live');
    if(s.width&&s.height){ resHint.textContent=s.width+'\u00d7'+s.height+' px'; show(resHint); }
  }

  function handleCameraError(err){
    var n=err&&err.name;
    if(n==='NotAllowedError'||n==='SecurityError')
      showError('Camera permission needed','Allow camera access, then tap Try again. On iPhone: Settings \u203a your browser \u203a Camera.');
    else if(n==='NotFoundError'||n==='OverconstrainedError')
      showError('No camera found','No rear camera was available.');
    else if(n==='NotReadableError')
      showError('Camera is busy','Another app may be using the camera. Close it and tap Try again.');
    else showError('Camera unavailable',(err&&err.message)||'Unknown error.');
  }

  function showError(title,html){
    stopCamera();
    errorTitle.textContent=title; errorText.innerHTML=html;
    show(errorPanel); hide(startPanel); readout.classList.remove('on');
    video.classList.remove('on'); reticle.classList.remove('on');
    hide(shutterBtn); hide(retakeBtn); hide(findBtn); hide(resHint); tuner.classList.add('hidden');
    setStatus('Error','err');
  }
  function stopCamera(){ if(stream){ stream.getTracks().forEach(function(t){t.stop();}); stream=null; } video.srcObject=null; }

  function capture(){
    var w=video.videoWidth, h=video.videoHeight; if(!w||!h) return;
    shot.width=w; shot.height=h;
    var ctx=shot.getContext('2d');
    ctx.drawImage(video,0,0,w,h);
    rawImageData=ctx.getImageData(0,0,w,h); mmPerPx=null; mode='find'; lastCard=null;
    video.classList.remove('on'); shot.classList.add('on'); reticle.classList.remove('on');
    hide(shutterBtn); show(retakeBtn); show(findBtn); readout.classList.remove('on'); tuner.classList.add('hidden');
    refreshFindBtn();
    setStatus('Photo captured','');
    resHint.textContent=w+'\u00d7'+h+' px captured'; show(resHint);
  }
  function retake(){
    rawImageData=null; mmPerPx=null; mode='find'; lastCard=null;
    shot.classList.remove('on'); video.classList.add('on'); reticle.classList.add('on');
    hide(retakeBtn); hide(findBtn); readout.classList.remove('on'); show(shutterBtn); tuner.classList.add('hidden');
    setStatus('Live \u00b7 rear camera','live');
    var tr=stream&&stream.getVideoTracks()[0], s=(tr&&tr.getSettings)?tr.getSettings():{};
    if(s.width&&s.height) resHint.textContent=s.width+'\u00d7'+s.height+' px';
  }
  function refreshFindBtn(){
    if(!rawImageData) return;
    findBtn.disabled=!cvReady;
    findBtn.textContent=cvReady?'Find card':'Loading vision\u2026';
  }

  function onPrimary(){
    if(!cvReady||!rawImageData) return;
    if(mode==='measure'){
      findBtn.disabled=true; findBtn.textContent='Measuring\u2026';
      setStatus('Measuring coins\u2026','busy');
      setTimeout(runCoinDetection,40);
    } else {
      findBtn.disabled=true; findBtn.textContent='Detecting\u2026';
      setStatus('Detecting card\u2026','busy');
      setTimeout(runDetection,40);
    }
  }

  function runDetection(){
    var ctx=shot.getContext('2d');
    ctx.putImageData(rawImageData,0,0);
    var src=cv.matFromImageData(rawImageData);
    var gray=new cv.Mat(), blur=new cv.Mat(), edges=new cv.Mat();
    cv.cvtColor(src,gray,cv.COLOR_RGBA2GRAY);
    cv.GaussianBlur(gray,blur,new cv.Size(5,5),0);
    cv.Canny(blur,edges,50,150);
    var kernel=cv.getStructuringElement(cv.MORPH_RECT,new cv.Size(5,5));
    cv.dilate(edges,edges,kernel);
    var contours=new cv.MatVector(), hierarchy=new cv.Mat();
    cv.findContours(edges,contours,hierarchy,cv.RETR_LIST,cv.CHAIN_APPROX_SIMPLE);
    var imgArea=src.rows*src.cols, best=null;
    for(var i=0;i<contours.size();i++){
      var cnt=contours.get(i);
      var area=cv.contourArea(cnt);
      if(area<imgArea*0.01){ cnt.delete(); continue; }
      var peri=cv.arcLength(cnt,true);
      var approx=new cv.Mat();
      cv.approxPolyDP(cnt,approx,0.02*peri,true);
      if(approx.rows===4 && cv.isContourConvex(approx)){
        var rect=cv.minAreaRect(cnt);
        var w=rect.size.width, h=rect.size.height;
        var lng=Math.max(w,h), sht=Math.min(w,h);
        var ratio=lng/sht, rectangularity=area/(w*h);
        if(ratio>1.45 && ratio<1.75 && rectangularity>0.82){
          if(!best || area>best.area){
            var pts=[];
            for(var k=0;k<4;k++) pts.push({x:approx.data32S[k*2], y:approx.data32S[k*2+1]});
            best={area:area, lng:lng, sht:sht, ratio:ratio, rectangularity:rectangularity, pts:pts};
          }
        }
      }
      approx.delete(); cnt.delete();
    }
    src.delete(); gray.delete(); blur.delete(); edges.delete();
    kernel.delete(); contours.delete(); hierarchy.delete();
    findBtn.disabled=false;
    if(!best){ lastCard=null; mode='find'; findBtn.textContent='Re-detect'; showNoCard(); }
    else{ lastCard=best; mode='measure'; findBtn.textContent='Measure coins'; tuner.classList.remove('hidden'); showCard(best); }
  }

  function showCard(c){
    var mmL=CARD_LONG/c.lng, mmS=CARD_SHORT/c.sht;
    mmPerPx=(mmL+mmS)/2;
    try{ c.H=computeCardH(c.pts); }catch(e){ c.H=null; }
    var agreement=1-Math.abs(mmL-mmS)/mmPerPx;
    drawOverlay(c.pts);
    var good=agreement>0.94;
    readoutMain.innerHTML='<span class="'+(good?'tick':'bad')+'">'+(good?'\u2713':'!')+'</span>Card found \u00b7 '+mmPerPx.toFixed(4)+' mm/px';
    readoutSub.textContent='long '+Math.round(c.lng)+'px\u2192'+CARD_LONG+'mm  \u00b7  short '+Math.round(c.sht)+'px\u2192'+CARD_SHORT+'mm  \u00b7  agree '+Math.round(agreement*100)+'%';
    readout.classList.add('on'); setStatus('Scale locked','');
  }
  function showNoCard(){
    mmPerPx=null;
    readoutMain.innerHTML='<span class="bad">!</span>No card detected';
    readoutSub.textContent='Show the whole card, flat, with clear edges against a plain, contrasting surface. Then Re-detect.';
    readout.classList.add('on'); setStatus('No card found','err');
  }
  function drawOverlay(pts){
    var ctx=shot.getContext('2d');
    var lw=Math.max(3, shot.width/300);
    ctx.lineJoin='round'; ctx.strokeStyle='#E6B450'; ctx.lineWidth=lw;
    ctx.beginPath(); ctx.moveTo(pts[0].x,pts[0].y);
    for(var i=1;i<pts.length;i++) ctx.lineTo(pts[i].x,pts[i].y);
    ctx.closePath(); ctx.stroke();
    ctx.fillStyle='#10151C';
    for(var j=0;j<pts.length;j++){ ctx.beginPath(); ctx.arc(pts[j].x,pts[j].y,lw*1.8,0,Math.PI*2); ctx.fill(); ctx.stroke(); }
  }

  /* ---------------- Coin detection (Stage 3) ---------------- */
  function runCoinDetection(){
    if(mmPerPx==null){ findBtn.disabled=false; findBtn.textContent='Find card'; mode='find'; setStatus('Find the card first','err'); return; }
    var ctx=shot.getContext('2d');
    ctx.putImageData(rawImageData,0,0);
    if(lastCard) drawOverlay(lastCard.pts);

    var src=cv.matFromImageData(rawImageData);
    var gray=new cv.Mat();
    cv.cvtColor(src,gray,cv.COLOR_RGBA2GRAY);
    cv.medianBlur(gray,gray,5);

    var circles=new cv.Mat();
    var minR=Math.round((14/2)/mmPerPx);   // ~1c minus margin
    var maxR=Math.round((28/2)/mmPerPx);   // ~2 euro plus margin
    var minDist=Math.max(10, Math.round(minR*1.3));
    // param2 lowered (35 -> 28) to catch low-contrast copper coins on wood
    cv.HoughCircles(gray,circles,cv.HOUGH_GRADIENT,1,minDist,100,coinParam2,minR,maxR);

    var H = lastCard && lastCard.H;
    var W=src.cols, Hei=src.rows;
    var cand=[];
    for(var i=0;i<circles.cols;i++){                          // Hough returns strongest first
      var x=circles.data32F[i*3], y=circles.data32F[i*3+1], r=circles.data32F[i*3+2];
      if(x<0||y<0||x>=W||y>=Hei) continue;
      if(lastCard && pointInPoly(x,y,lastCard.pts)) continue;  // on the card
      var d = H ? coinDiameterMM(H,x,y,r) : 2*r*mmPerPx;       // homography -> real mm
      if(d<15 || d>27) continue;                               // outside the euro size range
      if(meanLuma(rawImageData,x,y,r) < 50) continue;          // dark cable / deep shadow, not a coin
      cand.push({x:x,y:y,r:r,d:d});
    }
    // non-maximum suppression: collapse overlapping duplicates, keep the strongest
    coins=[];
    for(var a=0;a<cand.length;a++){
      var c=cand[a], ov=false;
      for(var b=0;b<coins.length;b++){
        var k=coins[b];
        if(Math.hypot(c.x-k.x,c.y-k.y) < 0.6*(c.r+k.r)){ ov=true; break; }
      }
      if(!ov) coins.push(c);
    }
    for(var ci=0;ci<coins.length;ci++){
      coins[ci].color=sampleColorStats(rawImageData,coins[ci].x,coins[ci].y,coins[ci].r);
      coins[ci].cls=classifyCoin(coins[ci].d,coins[ci].color);
    }
    circles.delete(); src.delete(); gray.delete();

    drawCoins(coins);
    showCoins(coins);
    findBtn.disabled=false; findBtn.textContent='Re-measure';
  }

  /* --- Homography: map the tilted card plane to true millimetres --- */
  function orderPts(p){                         // -> [TL,TR,BR,BL]
    var bySum=p.slice().sort(function(a,b){ return (a.x+a.y)-(b.x+b.y); });
    var TL=bySum[0], BR=bySum[3];
    var byDiff=p.slice().sort(function(a,b){ return (a.x-a.y)-(b.x-b.y); });
    var BL=byDiff[0], TR=byDiff[3];
    return [TL,TR,BR,BL];
  }
  function computeCardH(pts){
    var o=orderPts(pts);
    var topLen=Math.hypot(o[1].x-o[0].x, o[1].y-o[0].y);
    var leftLen=Math.hypot(o[3].x-o[0].x, o[3].y-o[0].y);
    var L=CARD_LONG, S=CARD_SHORT, dst;
    if(topLen>=leftLen) dst=[0,0, L,0, L,S, 0,S];   // long side across the top
    else                dst=[0,0, S,0, S,L, 0,L];   // short side across the top
    var srcM=cv.matFromArray(4,1,cv.CV_32FC2,[o[0].x,o[0].y,o[1].x,o[1].y,o[2].x,o[2].y,o[3].x,o[3].y]);
    var dstM=cv.matFromArray(4,1,cv.CV_32FC2,dst);
    var M=cv.getPerspectiveTransform(srcM,dstM);
    var arr=[]; for(var i=0;i<9;i++) arr.push(M.data64F[i]);
    srcM.delete(); dstM.delete(); M.delete();
    return arr;
  }
  function applyH(H,x,y){
    var X=H[0]*x+H[1]*y+H[2], Y=H[3]*x+H[4]*y+H[5], W=H[6]*x+H[7]*y+H[8];
    return [X/W, Y/W];
  }
  function coinDiameterMM(H,cx,cy,r){
    var c=applyH(H,cx,cy);
    var e=[[cx+r,cy],[cx-r,cy],[cx,cy+r],[cx,cy-r]];
    var sum=0;
    for(var i=0;i<4;i++){ var q=applyH(H,e[i][0],e[i][1]); var dx=q[0]-c[0], dy=q[1]-c[1]; sum+=Math.sqrt(dx*dx+dy*dy); }
    return 2*sum/4;
  }
  function meanLuma(img,cx,cy,r){
    var w=img.width, h=img.height, d=img.data;
    var offs=[[0,0],[0.5,0],[-0.5,0],[0,0.5],[0,-0.5],[0.35,0.35],[-0.35,0.35],[0.35,-0.35],[-0.35,-0.35]];
    var sum=0,n=0;
    for(var i=0;i<offs.length;i++){
      var px=Math.round(cx+offs[i][0]*r), py=Math.round(cy+offs[i][1]*r);
      if(px<0||py<0||px>=w||py>=h) continue;
      var idx=(py*w+px)*4;
      sum += 0.299*d[idx]+0.587*d[idx+1]+0.114*d[idx+2]; n++;
    }
    return n ? sum/n : 0;
  }

  function pointInPoly(x,y,poly){
    var inside=false;
    for(var i=0,j=poly.length-1;i<poly.length;j=i++){
      var xi=poly[i].x, yi=poly[i].y, xj=poly[j].x, yj=poly[j].y;
      if(((yi>y)!==(yj>y)) && (x < (xj-xi)*(y-yi)/(yj-yi)+xi)) inside=!inside;
    }
    return inside;
  }

  function roundRect(ctx,x,y,w,h,r){
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+h,r);
    ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r);
    ctx.arcTo(x,y,x+w,y,r);
    ctx.closePath();
  }

  function famColor(f){ return f==='copper'?'#E0894C':f==='gold'?'#E6B450':f==='bimetal'?'#B9C2CE':'#4FE3A6'; }
  function drawCoins(list){
    var ctx=shot.getContext('2d');
    var lw=Math.max(3, shot.width/300);
    var fs=Math.max(20, Math.round(shot.width/40));
    var fs2=Math.round(fs*0.62);
    ctx.textAlign='center'; ctx.textBaseline='middle';
    for(var i=0;i<list.length;i++){
      var c=list[i], col=famColor(c.cls?c.cls.family:'');
      ctx.strokeStyle=col; ctx.lineWidth=lw;
      ctx.beginPath(); ctx.arc(c.x,c.y,c.r,0,Math.PI*2); ctx.stroke();
      var denom=c.cls?c.cls.l:'?', mm=c.d.toFixed(1);
      ctx.font='700 '+fs+'px ui-monospace,Menlo,monospace'; var w1=ctx.measureText(denom).width;
      ctx.font='500 '+fs2+'px ui-monospace,Menlo,monospace'; var w2=ctx.measureText(mm).width;
      var pw=Math.max(w1,w2)+16, ph=fs+fs2+14;
      ctx.fillStyle='rgba(16,21,28,.85)';
      roundRect(ctx, c.x-pw/2, c.y-ph/2, pw, ph, 8); ctx.fill();
      ctx.fillStyle=col; ctx.font='700 '+fs+'px ui-monospace,Menlo,monospace';
      ctx.fillText(denom, c.x, c.y-fs2/2-1);
      ctx.fillStyle='#9AA4B2'; ctx.font='500 '+fs2+'px ui-monospace,Menlo,monospace';
      ctx.fillText(mm, c.x, c.y+fs/2-1);
    }
  }

  function showCoins(list){
    if(list.length===0){
      readoutMain.innerHTML='<span class="bad">!</span>No coins detected';
      readoutSub.textContent='Spread the coins apart on a plain surface, keep them sharp, then adjust the threshold or Re-measure.';
      readout.classList.add('on'); setStatus('No coins found','err'); return;
    }
    var cents=0, tally={};
    for(var i=0;i<list.length;i++){ var cl=list[i].cls; if(!cl) continue; cents+=cl.cents; tally[cl.l]=(tally[cl.l]||0)+1; }
    var euro=(cents/100).toFixed(2);
    var order=['1c','2c','5c','10c','20c','50c','1\u20ac','2\u20ac'], parts=[];
    for(var k=0;k<order.length;k++){ if(tally[order[k]]) parts.push(tally[order[k]]+'\u00d7'+order[k]); }
    readoutMain.innerHTML='<span class="tick">\u2713</span>Total \u20ac'+euro;
    readoutSub.textContent=list.length+' coins \u00b7 '+parts.join('   ');
    readout.classList.add('on'); setStatus('\u20ac'+euro+' \u00b7 '+list.length+' coins','');
  }

  /* ---------------- Colour + denomination (Stage 4) ---------------- */
  var DENOMS={
    copper:[{d:16.25,cents:1,l:'1c',family:'copper'},{d:18.75,cents:2,l:'2c',family:'copper'},{d:21.25,cents:5,l:'5c',family:'copper'}],
    gold:[{d:19.75,cents:10,l:'10c',family:'gold'},{d:22.25,cents:20,l:'20c',family:'gold'},{d:24.25,cents:50,l:'50c',family:'gold'}],
    bimetal:[{d:23.25,cents:100,l:'1\u20ac',family:'bimetal'},{d:25.75,cents:200,l:'2\u20ac',family:'bimetal'}]
  };
  var S_SILVER=0.30, S_CONTRAST=0.12, COPPER_HUE_MAX=30;
  function nearestDen(d,arr){ var best=arr[0],bd=1e9; for(var i=0;i<arr.length;i++){ var e=Math.abs(d-arr[i].d); if(e<bd){bd=e;best=arr[i];} } return best; }
  function classifyCoin(d,st){
    var cSil=st.center.s<S_SILVER, rSil=st.ring.s<S_SILVER;
    if(cSil!==rSil && Math.abs(st.center.s-st.ring.s)>S_CONTRAST){
      return cSil?DENOMS.bimetal[0]:DENOMS.bimetal[1];   // silver centre = 1 euro, silver ring = 2 euro
    }
    if(st.all.s<S_SILVER) return nearestDen(d,DENOMS.bimetal);
    return nearestDen(d, st.all.h<COPPER_HUE_MAX?DENOMS.copper:DENOMS.gold);
  }
  function rgb2hsv(r,g,b){
    r/=255;g/=255;b/=255;
    var mx=Math.max(r,g,b),mn=Math.min(r,g,b),df=mx-mn,h=0;
    if(df!==0){
      if(mx===r) h=((g-b)/df)%6; else if(mx===g) h=(b-r)/df+2; else h=(r-g)/df+4;
      h*=60; if(h<0)h+=360;
    }
    return [h, mx===0?0:df/mx, mx];
  }
  function sampleColorStats(img,cx,cy,r){
    var w=img.width,h=img.height,data=img.data;
    function acc(){ return {sin:0,cos:0,s:0,v:0,n:0}; }
    var C=acc(),R=acc(),A=acc();
    var rings=[[0.0,C],[0.25,C],[0.45,C],[0.65,R],[0.8,R],[0.9,R]];
    for(var ri=0;ri<rings.length;ri++){
      var frac=rings[ri][0], bucket=rings[ri][1], steps=(frac===0?1:12);
      for(var a=0;a<steps;a++){
        var ang=a/steps*Math.PI*2;
        var px=Math.round(cx+Math.cos(ang)*frac*r), py=Math.round(cy+Math.sin(ang)*frac*r);
        if(px<0||py<0||px>=w||py>=h) continue;
        var idx=(py*w+px)*4, hsv=rgb2hsv(data[idx],data[idx+1],data[idx+2]);
        if(hsv[2]>0.96 && hsv[1]<0.12) continue;   // glare
        if(hsv[2]<0.12) continue;                   // shadow
        var rad=hsv[0]*Math.PI/180;
        bucket.sin+=Math.sin(rad)*hsv[1]; bucket.cos+=Math.cos(rad)*hsv[1]; bucket.s+=hsv[1]; bucket.v+=hsv[2]; bucket.n++;
        A.sin+=Math.sin(rad)*hsv[1]; A.cos+=Math.cos(rad)*hsv[1]; A.s+=hsv[1]; A.v+=hsv[2]; A.n++;
      }
    }
    function fin(o){ var n=o.n||1; var hue=Math.atan2(o.sin,o.cos)*180/Math.PI; if(hue<0)hue+=360; return {h:hue,s:o.s/n,v:o.v/n}; }
    return {center:fin(C),ring:fin(R),all:fin(A)};
  }

  startBtn.addEventListener('click',startCamera);
  retryBtn.addEventListener('click',startCamera);
  shutterBtn.addEventListener('click',capture);
  retakeBtn.addEventListener('click',retake);
  findBtn.addEventListener('click',onPrimary);
  thresh.addEventListener('input',function(){
    coinParam2=parseInt(thresh.value,10);
    tunerVal.textContent=coinParam2;
    if(mode==='measure' && rawImageData){
      clearTimeout(threshTimer);
      threshTimer=setTimeout(function(){ runCoinDetection(); },140);
    }
  });
  thresh.value=coinParam2; tunerVal.textContent=coinParam2;
  var _v=document.getElementById('ver'); if(_v) _v.textContent='v'+VERSION;
  try{ console.log('Coin Meter v'+VERSION); }catch(e){}

  setStatus((window.cv&&cv.Mat)?'Ready':'Loading vision engine\u2026',(window.cv&&cv.Mat)?'':'busy');
})();
</script>
